name: Live extractor check

on:
  schedule:
    # 06:00 UTC = 07:00 CET / 08:00 CEST (after suppliers' overnight publication).
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypdf pdfplumber aiohttp

      - name: Run live check (up to 5 attempts on extractor failure)
        id: check
        run: |
          set +e
          attempts=5
          delays="10 30 60 120 300"
          set -- $delays
          for i in $(seq 1 "$attempts"); do
            echo "::group::attempt $i"
            python scripts/live_check.py > report.md
            rc=$?
            cat report.md
            echo "::endgroup::"
            # rc bit 0 (1) = extractor failure — worth retrying.
            # rc bit 1 (2) = catalog signal, stable — don't retry.
            # rc bit 2 (4) = drift signal, stable — don't retry.
            # rc 0 = all green.
            if [ $((rc & 1)) -eq 0 ]; then
              break
            fi
            if [ "$i" -lt "$attempts" ]; then
              sleep_for=$1
              shift
              echo "attempt $i failed (exit $rc), sleeping ${sleep_for}s..." >&2
              sleep "$sleep_for"
            fi
          done
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # Exit 0 here so subsequent issue-creation steps run regardless
          # of which kind of failure was detected; they branch on rc.
          exit 0

      - name: Open or update extractor-broken issue
        # rc bit 0 set: extractor failure.
        if: |
          steps.check.outputs.rc == '1'
          || steps.check.outputs.rc == '3'
          || steps.check.outputs.rc == '5'
          || steps.check.outputs.rc == '7'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title_prefix='[live-check] supplier extractor broken'
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "## Run"
            echo
            echo "$run_url"
            echo
            echo "## Last report"
            echo
            cat report.md
          } > issue_body.md

          existing=$(gh issue list \
            --state open \
            --search "\"$title_prefix\" in:title" \
            --json number,title \
            --jq '.[0].number // empty')

          if [ -n "$existing" ]; then
            echo "appending comment to issue #$existing"
            gh issue comment "$existing" --body-file issue_body.md
          else
            gh issue create \
              --title "$title_prefix ($(date -u +%Y-%m-%d))" \
              --body-file issue_body.md
          fi

      - name: Open or update drift issue
        # rc bit 2 (4): per-supplier latency or byte budget blown.
        # Independent issue from the extractor / catalog ones so the
        # three failure modes don't conflate in one thread.
        if: always() && (
            steps.check.outputs.rc == '4'
            || steps.check.outputs.rc == '5'
            || steps.check.outputs.rc == '6'
            || steps.check.outputs.rc == '7'
          )
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title_prefix='[live-check] supplier drift detected'
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "## Run"
            echo
            echo "$run_url"
            echo
            echo "## Drift report"
            echo
            cat drift_report.md
          } > drift_issue_body.md

          existing=$(gh issue list \
            --state open \
            --search "\"$title_prefix\" in:title" \
            --json number,title \
            --jq '.[0].number // empty')

          if [ -n "$existing" ]; then
            echo "appending comment to issue #$existing"
            gh issue comment "$existing" --body-file drift_issue_body.md
          else
            gh issue create \
              --title "$title_prefix ($(date -u +%Y-%m-%d))" \
              --body-file drift_issue_body.md
          fi

      - name: Open or update new-products issue
        # rc bit 1 set: a new product was detected at a supplier we
        # know how to discover. Independent issue from the extractor
        # one so the two failure modes don't conflate in one thread.
        if: always() && (
            steps.check.outputs.rc == '2'
            || steps.check.outputs.rc == '3'
            || steps.check.outputs.rc == '6'
            || steps.check.outputs.rc == '7'
          )
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title_prefix='[live-check] new supplier products detected'
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "## Run"
            echo
            echo "$run_url"
            echo
            echo "## Catalog diff"
            echo
            cat catalog_report.md
          } > catalog_issue_body.md

          existing=$(gh issue list \
            --state open \
            --search "\"$title_prefix\" in:title" \
            --json number,title \
            --jq '.[0].number // empty')

          if [ -n "$existing" ]; then
            echo "appending comment to issue #$existing"
            gh issue comment "$existing" --body-file catalog_issue_body.md
          else
            gh issue create \
              --title "$title_prefix ($(date -u +%Y-%m-%d))" \
              --body-file catalog_issue_body.md
          fi
