name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel a stale push/PR run when a new commit lands so we never queue
# multiple parallel runs for the same ref.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Pin homeassistant + pytest-homeassistant-custom-component
          # (and pytest-freezer used by the time-pinned tests) to
          # known-good versions; an upstream HA-core or test-shim
          # release would otherwise silently turn the suite red on main.
          pip install \
            ruff \
            mypy \
            pytest \
            pytest-asyncio \
            pytest-freezer==0.4.9 \
            pypdf \
            pdfplumber \
            defusedxml \
            homeassistant==2026.2.3 \
            pytest-homeassistant-custom-component==0.13.316
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Type check (production code, --strict)
        run: mypy --strict custom_components/be_electricity_prices
      - name: Type check (tests + helper scripts, non-strict)
        # Tests aren't --strict-clean (the harness has untyped helpers
        # the integration code never imports), but a non-strict mypy
        # still catches Mapping[str,str]|None index errors and the
        # like. live_check.py runs as a daily workflow; covering it
        # here means a regression surfaces on PR rather than in the
        # next 06:00 UTC scheduled run.
        run: mypy custom_components/ tests/ scripts/
      - name: Tests
        run: pytest tests/ -q
