name: Autorelease

on:
  push:
    branches:
      - main
    paths:
      - custom_components/be_electricity_prices/manifest.json

permissions:
  contents: write

# Two manifest bumps in quick succession would otherwise race on git tag
# / gh release create. Serialise them per-ref so the second push waits
# for the first to finish (cancel-in-progress: false to avoid orphaning
# a half-published release).
concurrency:
  group: autorelease-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Inline the Tests + Validate gate so a manifest bump on a red branch
  # can never publish. Mirrors test.yml + validate.yml; if either drifts,
  # this needs to be kept in sync (small duplication, big safety win).
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            ruff \
            mypy \
            pytest \
            pytest-asyncio \
            pytest-freezer==0.4.9 \
            pypdf \
            pdfplumber \
            defusedxml \
            homeassistant==2026.2.3 \
            pytest-homeassistant-custom-component==0.13.316
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Type check
        run: mypy --strict custom_components/be_electricity_prices
      - name: Tests
        run: pytest tests/ -q

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master

  release:
    runs-on: ubuntu-latest
    needs: [verify, hacs, hassfest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          ver=$(jq -r .version custom_components/be_electricity_prices/manifest.json)
          if [ -z "$ver" ] || [ "$ver" = "null" ]; then
            echo "no version in manifest.json" >&2
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release zip
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p dist
          cd custom_components/be_electricity_prices
          zip -qr ../../dist/be_electricity_prices.zip . \
            -x '*.pyc' '__pycache__/*' '*/__pycache__/*'
          cd ../..
          unzip -l dist/be_electricity_prices.zip

      - name: Tag and release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          tag="${{ steps.version.outputs.tag }}"
          # Tag + push are idempotent enough to leave outside the retry
          # loop: if the tag is already on origin we still want to
          # proceed to release creation. The push command tolerates the
          # "already exists" case the same way 'git push origin <tag>'
          # does locally.
          git tag "$tag"
          git push origin "$tag"
          # gh release create is the operation that lost v0.5.28 to a
          # 504 from GitHub's REST API. Retry up to 5 times with
          # exponential backoff so a transient API blip doesn't strand
          # a release without an attached zip.
          attempts=5
          delays="10 30 60 120"
          set -- $delays
          for i in $(seq 1 "$attempts"); do
            echo "::group::release attempt $i"
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              dist/be_electricity_prices.zip
            rc=$?
            echo "::endgroup::"
            if [ $rc -eq 0 ]; then
              break
            fi
            # If the release was created on a prior attempt that died
            # mid-call, treat it as success on the retry.
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "release $tag already exists, treating as success"
              rc=0
              break
            fi
            if [ "$i" -lt "$attempts" ]; then
              sleep_for=$1
              shift
              echo "release attempt $i failed (exit $rc), sleeping ${sleep_for}s..." >&2
              sleep "$sleep_for"
            fi
          done
          exit $rc
