refresh:
  name: Refresh
  description: >-
    Force-refresh every Belgian Electricity Prices entry: drops the cached
    supplier snapshot and the ENTSO-E spot cache, then re-fetches both
    immediately. Useful after a tariff card update or to clear a temporary
    fetch error without waiting for the next refresh tick.

cheapest_window:
  name: Cheapest window
  description: >-
    Find the cheapest contiguous window of N hours within the upcoming
    price table. Returns start, end, average EUR/kWh and the per-hour
    breakdown. Useful for scheduling EV charging or a heat pump.
  fields:
    duration_hours:
      name: Duration
      description: Window length in whole hours (price table is hourly).
      required: true
      example: 3
      selector:
        number:
          min: 1
          max: 48
          step: 1
          unit_of_measurement: h
    entry_id:
      name: Entry ID
      description: >-
        Target a specific config entry. Defaults to the first loaded entry
        when omitted (only matters if multiple suppliers are configured).
      example: 4f3c8...
      selector:
        config_entry:
          integration: be_electricity_prices
    earliest_start:
      name: Earliest start
      description: >-
        Don't consider windows starting before this time. The price table is
        hourly, so the value is truncated down to the hour (14:30 still
        considers the 14:00 slot as a candidate start). Default = now.
      example: "2026-04-30T20:00:00+02:00"
      selector:
        datetime:
    latest_end:
      name: Latest end
      description: Don't consider windows ending after this time.
      example: "2026-05-01T08:00:00+02:00"
      selector:
        datetime:

backfill_statistics:
  name: Backfill statistics
  description: >-
    Populate the recorder's long-term statistics for this entry's
    price sensors and current_year_cost over a date range. Useful to
    redo a window after fixing a tariff card or to seed history
    further back than the automatic Jan 1 anchor. Re-runs are safe:
    rows are upserted by (statistic_id, hour). Pass clear=true to
    delete the target series first when the underlying tariff
    changed.
  fields:
    entry_id:
      name: Entry ID
      description: >-
        Target a specific config entry. Defaults to the first loaded
        entry when omitted (only matters if multiple suppliers are
        configured).
      example: 4f3c8...
      selector:
        config_entry:
          integration: be_electricity_prices
    start:
      name: Start
      description: >-
        First hour to backfill. Default = Jan 1 00:00 of the current
        local year.
      example: "2026-01-01T00:00:00+01:00"
      selector:
        datetime:
    end:
      name: End
      description: >-
        First hour NOT to backfill (exclusive). Default = current
        hour, so the in-progress hour the live coordinator is about
        to write itself stays untouched.
      example: "2026-05-01T00:00:00+02:00"
      selector:
        datetime:
    clear:
      name: Clear ENTIRE series before re-import
      description: >-
        Destructive: deletes EVERY existing row of the target
        statistic series, not just the requested range, and the
        re-import only repopulates the requested range. Use ONLY when
        re-running a full year (default range = Jan 1 to now). For a
        narrower window, leave this off: the import upserts on
        (statistic_id, hour) so a re-run already overwrites the
        requested hours without touching anything outside the range.
      default: false
      selector:
        boolean:

most_expensive_window:
  name: Most expensive window
  description: >-
    Find the most expensive contiguous window of N hours within the
    upcoming price table. Returns start, end, average EUR/kWh and the
